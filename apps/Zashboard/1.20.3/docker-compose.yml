services:
  zashboard:
    image: ghcr.io/liandu2024/ange-clashboard:v1.20.3
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - ${PANEL_APP_PORT_HTTP}:2048
    volumes:
      - ./data:/app/data
    networks:
      - 1panel-network
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
