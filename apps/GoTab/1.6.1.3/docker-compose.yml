services:
  gotab:
    image: doxwant/gotab:latest
    container_name: ${CONTAINER_NAME}
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    environment:
      - SERVER_PORT=8080
    volumes:
      - ./uploads:/app/uploads
      - ./sourceStore:/app/sourceStore
      - ./config.toml:/app/config.toml
    restart: always
    networks:
      - 1panel-network
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
