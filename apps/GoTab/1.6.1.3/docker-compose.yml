services:
  gotab:
    image: doxwant/gotab:latest
    container_name: ${CONTAINER_NAME}
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./uploads:/app/uploads
      - ./sourceStore:/app/sourceStore
      - ./config.toml:/app/config.toml
      - /etc/localtime:/etc/localtime:ro
    restart: always
    networks:
      - 1panel-network
    labels:
      createdBy: Apps

networks:
  1panel-network:
    external: true