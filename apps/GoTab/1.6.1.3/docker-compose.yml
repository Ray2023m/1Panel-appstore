services:
  gotab:
    image: doxwant/gotab:1.6.1.3
    container_name: ${CONTAINER_NAME}
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    volumes:
      - ./uploads:/app/uploads
      - ./sourceStore:/app/sourceStore
      - ./config.toml:/app/config.toml
    restart: always
    networks:
      - 1panel-network
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
