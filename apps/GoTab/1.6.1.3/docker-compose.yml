services:
  gotab:
    image: doxwant/gotab:1.6.1.3
    container_name: ${CONTAINER_NAME}
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    volumes:
      - ./uploads:/app/uploads
      - ./sourceStore:/app/sourceStore
      - type: bind
        source: ./config.toml
        target: /app/config.toml
    environment:
      - SERVER_PORT=8080
    restart: always
    network_mode: host
    networks:
      - 1panel-network
    labels:
      createdBy: Apps
networks:
  1panel-network:
    external: true
